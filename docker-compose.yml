version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: avtotest_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-avtotestdb}
      POSTGRES_USER: ${DB_USER:-avtotestuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-avtotestpassword}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-avtotestuser} -d ${DB_NAME:-avtotestdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: avtotest_web
    restart: always
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:1.25-alpine
    container_name: avtotest_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
